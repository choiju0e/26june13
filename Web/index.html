<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;500&family=Noto+Sans+KR:wght@300;400;500&display=swap');

@font-face {
  font-family: 'Ownglyph EUIJIN';
  src: url('./fonts/OwnglyphEUIJIN.ttf') format('truetype');
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Ownglyph EUIJIN', sans-serif;
  background: #F5F5F5;
  color: #4a3f35;
  min-height: 100vh;
}

/* ── INTRO ── */
#intro {
  position: fixed;
  inset: 0;
  z-index: 99999;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  background: #F5F5F5;
  transition: opacity 1s ease;
}
#intro.hide {
  opacity: 0;
  pointer-events: none;
}
@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

/* ── PHONE WRAP ── */
.phone-wrap {
  max-width: 390px;
  margin: 0 auto;
  background: #F5F5F5;
  min-height: 100vh;
  overflow: hidden;
  position: relative;
}

/* ── BGM ── */
.bgm-btn {
  position: absolute;
  top: 20px;
  right: 20px;
  width: 42px;
  height: 42px;
  border: none;
  background: none;
  z-index: 10;
  cursor: pointer;
}

/* ── IMAGE SECTIONS ── */
.img-section { width: 100%; display: block; position: relative; background: #F5F5F5; }
.img-section img { width: 100%; display: block; }

/* ── 카운트다운 ── */

  font-family: 'Ownglyph EUIJIN', sans-serif;
  padding: 20px 20px 40px;

}
.dday-counter { display: flex; justify-content: center; gap: 30px; }
.dday-item { text-align: center; }
.dday-num { font-size: 35px; font-weight: 500; line-height: 1; }
.dday-unit { font-size: 10px; opacity: 0.7; margin-top: 2px; letter-spacing: 0.05em; }

/* ── GALLERY ── */
.gallery-section {
  padding: 50px 30px;
  background-image: url("img/05.png");
  background-repeat: repeat-y;
  background-size: 100% auto;
  background-position: top center;
  text-align: center;

.section-badge { display: inline-block; margin-bottom: 20px; padding: 0; background: none; }
.section-badge img { width: 100px; height: auto; display: block; }
.gallery-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; margin-top: 4px; }
.gallery-item {
  aspect-ratio: 3/4; background: #d6eaf5; border-radius: 0;
  display: flex; align-items: center; justify-content: center;

.gallery-item img { width: 100%; height: 100%; object-fit: cover; }
.gallery-more { display: none; }
.gallery-more.open { display: flex; }
.gallery-toggle-wrap { cursor: pointer; margin-top: 16px; display: flex; justify-content: center; }
.gallery-toggle-wrap img { width: 80px; height: auto; }

/* ── ACCOUNT ── */
.account-section { padding: 0; text-align: center; position: relative; }
.acc-group { overflow: hidden; }
.acc-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 18px; cursor: pointer; font-size: 18px;
  color: #fff; user-select: none; background: #989894;
}
.acc-chevron { font-size: 20px; color: #fff; transition: transform 0.3s; }
.acc-chevron.open { transform: rotate(180deg); }
.acc-body { display: none; flex-direction: column; background: #fdfaf6; }
.acc-body.open { display: flex; }
.acc-row {
  display: flex; align-items: center; justify-content: space-between;

.acc-row:last-child { border-bottom: none; }
.acc-name { color: #5a4a3a; font-size: 17px; text-align: left; }
.acc-num { color: #3a3530; font-weight: 500; font-size: 16px; text-align: left; }
.copy-btn {

/* ── TOAST ── */
.toast {
  position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(20px);
  background: rgba(50,50,50,0.88); color: #fff; padding: 10px 20px; border-radius: 20px;
  font-size: 13px; opacity: 0; transition: all 0.3s; pointer-events: none;
  white-space: nowrap; z-index: 999;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── LIGHTBOX ── */
.lightbox-overlay {

  background: rgba(0,0,0,0.92); z-index: 9999;
  align-items: center; justify-content: center;

.lightbox-overlay.active { display: flex; }
.lightbox-img {

.lightbox-close {

}
.lightbox-close:hover { opacity: 1; }
.lightbox-prev, .lightbox-next {

.lightbox-next { right: 0; }
.lightbox-prev:hover, .lightbox-next:hover { opacity: 1; }

/* ── 스크롤 페이드업 모션 ── */

  transform: translateY(40px);

}
.fade-up.visible {

</style>

<script>
  /* ── 카카오 SDK 초기화 ── */
  Kakao.init('77b9e2d24546416af46d7f10ecbc6af1');

  /* ── INTRO + BGM ── */
  var audio = document.getElementById('bgm');
  var btn = document.getElementById('bgmBtn');
  var icon = document.getElementById('bgmIcon');
  var intro = document.getElementById('intro');
  var isPlaying = false;

  intro.addEventListener('click', function() {
    // BGM 볼륨 페이드인 재생
    audio.volume = 0;
    audio.play().then(function() {
      isPlaying = true;
      icon.src = 'img/music_on.png';
      var vol = 0;
      var fade = setInterval(function() {
        vol = Math.min(vol + 0.05, 1);
        audio.volume = vol;
        if (vol >= 1) clearInterval(fade);
      }, 25);
    }).catch(function() {});

    // 인트로 페이드아웃
    intro.classList.add('hide');
    setTimeout(function() {
      intro.style.display = 'none';
    }, 1000);
  });

  /* ── BGM 버튼 토글 ── */
  btn.addEventListener('click', function(e) {
    e.stopPropagation();
    if (isPlaying) {
      audio.pause();
      icon.src = 'img/music_off.png';
    } else {
      audio.play();
      icon.src = 'img/music_on.png';
    }
    isPlaying = !isPlaying;
  });

  /* ── 갤러리 이미지 배열 ── */
  var galleryImages = [
    'img/gallery01.jpg','img/gallery02.jpg','img/gallery03.jpg',
    'img/gallery04.jpg','img/gallery05.jpg','img/gallery06.jpg',
    'img/gallery07.jpg','img/gallery08.jpg','img/gallery09.jpg',
    'img/gallery10.jpg','img/gallery11.jpg','img/gallery12.jpg',
    'img/gallery13.jpg','img/gallery14.jpg','img/gallery15.jpg',
    'img/gallery16.jpg','img/gallery17.jpg','img/gallery18.jpg'
  ];
  var currentIndex = 0;

  /* ── 갤러리 더보기 ── */
  var galleryOpen = false;
  function toggleGallery() {
    galleryOpen = !galleryOpen;
    document.querySelectorAll('.gallery-more').forEach(function(el) {
      el.classList.toggle('open', galleryOpen);
    });
    var img = document.getElementById('galleryToggleImg');
    img.src = galleryOpen ? 'img/btn_close.png' : 'img/btn_more.png';
    img.alt = galleryOpen ? '사진 접기' : '사진 더보기';
  }

  /* ── 라이트박스 ── */
  function openLightbox(index) {
    currentIndex = index;
    document.getElementById('lightboxImg').src = galleryImages[index];
    document.getElementById('lightbox').classList.add('active');
  }
  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('active');
  }
  function prevImage() {
    currentIndex = (currentIndex - 1 + galleryImages.length) % galleryImages.length;
    document.getElementById('lightboxImg').src = galleryImages[currentIndex];
  }
  function nextImage() {
    currentIndex = (currentIndex + 1) % galleryImages.length;
    document.getElementById('lightboxImg').src = galleryImages[currentIndex];
  }
  document.getElementById('lightboxClose').addEventListener('click', closeLightbox);
  document.getElementById('lightboxPrev').addEventListener('click', prevImage);
  document.getElementById('lightboxNext').addEventListener('click', nextImage);
  document.getElementById('lightbox').addEventListener('click', function(e) {
    if (e.target === this) closeLightbox();
  });

  /* ── D-DAY 카운트다운 ── */
  function updateDday() {
    var wedding = new Date('2026-06-13T13:30:00');
    var diff = wedding - new Date();
    if (diff < 0) {
      ['dd','dh','dm','ds'].forEach(function(id){ document.getElementById(id).textContent = '0'; });
      return;
    }
    document.getElementById('dd').textContent = Math.floor(diff / 86400000);
    document.getElementById('dh').textContent = Math.floor((diff % 86400000) / 3600000);
    document.getElementById('dm').textContent = Math.floor((diff % 3600000) / 60000);
    document.getElementById('ds').textContent = Math.floor((diff % 60000) / 1000);
  }
  updateDday();
  setInterval(updateDday, 1000);

  /* ── 아코디언 ── */
  function toggleAcc(id) {
    document.getElementById('body-' + id).classList.toggle('open');
    document.getElementById('chevron-' + id).classList.toggle('open');
  }

  /* ── 복사 ── */
  function copyText(text) {
    if (navigator.clipboard) {
      navigator.clipboard.writeText(text).then(function() { showToast('계좌번호가 복사되었습니다 ✓'); });
    } else {
      var el = document.createElement('textarea');
      el.value = text; document.body.appendChild(el); el.select();
      document.execCommand('copy'); document.body.removeChild(el);
      showToast('계좌번호가 복사되었습니다 ✓');
    }
  }

  /* ── 카카오톡 공유 ── */
 function shareKakao() {
  Kakao.Share.sendDefault({
    objectType: 'feed',
    content: {
      title: '지환 ♥ 민영 결혼합니다',
      description: '2026년 6월 13일, 소중한 날에 초대합니다',
      imageUrl: 'https://www.sumomo.store/img/og.jpg',
      link: {
        mobileWebUrl: 'https://www.sumomo.store',
        webUrl: 'https://www.sumomo.store',
      },
    },
    buttons: [{
      title: '청첩장 보러가기',
      link: {
        mobileWebUrl: 'https://www.sumomo.store',
        webUrl: 'https://www.sumomo.store',
      },
    }],
  });
}

  /* ── 링크 복사 ── */
  function shareLink() {
    var url = 'https://www.sumomo.store';
    if (navigator.clipboard) {
      navigator.clipboard.writeText(url).then(function() { showToast('링크가 복사되었습니다 ✓'); });
    } else {
      showToast('링크: ' + url);
    }
  }

  /* ── 토스트 ── */
  function showToast(msg) {
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(function() { t.classList.remove('show'); }, 2500);
  }

  /* ── 컨페티 ── */
  (function() {
    var canvas = document.getElementById('confetti-canvas');
    var ctx = canvas.getContext('2d');
    var W, H;
    function resize() {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    var colors = ['#88B4D3','#c8dce8','#ffd6e0','#d6eaf5','#b8d8ec','#ffffff'];
    var COUNT = 60;
    var pieces = [];
    for (var i = 0; i < COUNT; i++) {
      pieces.push({
        x: Math.random() * window.innerWidth,
        y: Math.random() * -window.innerHeight,
        w: Math.random() * 12 + 6,
        h: Math.random() * 4 + 2,
        color: colors[Math.floor(Math.random() * colors.length)],
        speed: Math.random() * 0.8 + 0.3,
        angle: Math.random() * 360,
        spin: Math.random() * 2 - 1,
        drift: Math.random() * 1 - 0.5,
        opacity: Math.random() * 0.5 + 0.5
      });
    }
    function draw() {
      ctx.clearRect(0, 0, W, H);
      pieces.forEach(function(p) {
        ctx.save();
        ctx.globalAlpha = p.opacity;
        ctx.translate(p.x, p.y);
        ctx.rotate(p.angle * Math.PI / 180);
        ctx.fillStyle = p.color;
        ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
        ctx.restore();
        p.y += p.speed;
        p.x += p.drift;
        p.angle += p.spin;
        if (p.y > H + 10) {
          p.y = -10;
          p.x = Math.random() * W;
        }
      });
      requestAnimationFrame(draw);
    }
    draw();
  })();

  /* ── 스크롤 페이드업 모션 ── */
  var fadeEls = document.querySelectorAll('.fade-up');
  var observer = new IntersectionObserver(function(entries) {
    entries.forEach(function(entry) {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
        observer.unobserve(entry.target);
      }
    });
  }, { threshold: 0.1 });
  fadeEls.forEach(function(el) { observer.observe(el); });

</script>
</body>
